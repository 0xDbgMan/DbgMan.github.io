<svg viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace" font-size="13">
  <style>
    .title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 12px; fill: #666; }
    .hdr { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    .cell { font-size: 12px; fill: #333; }
    .bad { fill: #e05252; font-weight: 700; }
    .good { fill: #1a1a1a; }
    .tag-bad { fill: #e05252; }
    .tag-good { fill: #333; }
    .bg-bad { fill: #fce8e8; }
    .bg-good { fill: #f0f0f0; }
    .bg-hdr { fill: #e0e0e0; }
    .border { stroke: #ccc; fill: none; stroke-width: 1; }
    .accent { fill: #e05252; }
    .label-box { rx: 6; ry: 6; stroke-width: 1; }
  </style>

  <!-- Title: Bad Loader -->
  <text x="360" y="28" text-anchor="middle" class="title">Basic Loader — VirtualAlloc with RWX</text>
  <text x="360" y="46" text-anchor="middle" class="sub">What a memory scanner (Process Hacker / Moneta) sees</text>

  <!-- Header row -->
  <rect x="30" y="58" width="660" height="26" class="bg-hdr" rx="4"/>
  <text x="50" y="76" class="hdr">Address</text>
  <text x="170" y="76" class="hdr">Size</text>
  <text x="270" y="76" class="hdr">Protection</text>
  <text x="400" y="76" class="hdr">Type</text>
  <text x="570" y="76" class="hdr">Verdict</text>

  <!-- Row 1: RWX — flagged -->
  <rect x="30" y="86" width="660" height="26" class="bg-bad" rx="0"/>
  <text x="50" y="104" class="cell">0x1A0000</text>
  <text x="170" y="104" class="cell">307,200</text>
  <text x="270" y="104" class="bad">RWX</text>
  <text x="400" y="104" class="cell">Private commit</text>
  <text x="570" y="104" class="bad">⛔ DETECTED</text>

  <!-- Row 2 -->
  <rect x="30" y="114" width="660" height="26" fill="#fafafa" rx="0"/>
  <text x="50" y="132" class="cell">0x7FFE0000</text>
  <text x="170" y="132" class="cell">4,096</text>
  <text x="270" y="132" class="cell">R</text>
  <text x="400" y="132" class="cell">Image (ntdll.dll)</text>
  <text x="570" y="132" class="good">Clean</text>

  <!-- Row 3 -->
  <rect x="30" y="142" width="660" height="26" fill="#f5f5f5" rx="0"/>
  <text x="50" y="160" class="cell">0x7FF80000</text>
  <text x="170" y="160" class="cell">1,835,008</text>
  <text x="270" y="160" class="cell">RX</text>
  <text x="400" y="160" class="cell">Image (ntdll.dll)</text>
  <text x="570" y="160" class="good">Clean</text>

  <!-- Separator -->
  <line x1="30" y1="195" x2="690" y2="195" stroke="#ccc" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Title: Good Loader -->
  <text x="360" y="225" text-anchor="middle" class="title">Crystal Palace Loader — Module Overloading</text>
  <text x="360" y="243" text-anchor="middle" class="sub">Same beacon payload — invisible to scanners</text>

  <!-- Header row -->
  <rect x="30" y="255" width="660" height="26" class="bg-hdr" rx="4"/>
  <text x="50" y="273" class="hdr">Address</text>
  <text x="170" y="273" class="hdr">Size</text>
  <text x="270" y="273" class="hdr">Protection</text>
  <text x="400" y="273" class="hdr">Type</text>
  <text x="570" y="273" class="hdr">Verdict</text>

  <!-- Row 1: Clean -->
  <rect x="30" y="283" width="660" height="26" class="bg-good" rx="0"/>
  <text x="50" y="301" class="cell">0x7FFB2000</text>
  <text x="170" y="301" class="cell">307,200</text>
  <text x="270" y="301" class="cell">RX</text>
  <text x="400" y="301" class="cell">Image (mshtml.dll)</text>
  <text x="570" y="301" class="good">✓ Clean</text>

  <!-- Row 2 -->
  <rect x="30" y="311" width="660" height="26" fill="#fafafa" rx="0"/>
  <text x="50" y="329" class="cell">0x7FFB5000</text>
  <text x="170" y="329" class="cell">81,920</text>
  <text x="270" y="329" class="cell">RW</text>
  <text x="400" y="329" class="cell">Image (mshtml.dll)</text>
  <text x="570" y="329" class="good">✓ Clean</text>

  <!-- Row 3 -->
  <rect x="30" y="339" width="660" height="26" fill="#f5f5f5" rx="0"/>
  <text x="50" y="357" class="cell">0x7FFE0000</text>
  <text x="170" y="357" class="cell">4,096</text>
  <text x="270" y="357" class="cell">R</text>
  <text x="400" y="357" class="cell">Image (ntdll.dll)</text>
  <text x="570" y="357" class="good">✓ Clean</text>

  <!-- Row 4 -->
  <rect x="30" y="367" width="660" height="26" fill="#fafafa" rx="0"/>
  <text x="50" y="385" class="cell">0x7FF80000</text>
  <text x="170" y="385" class="cell">1,835,008</text>
  <text x="270" y="385" class="cell">RX</text>
  <text x="400" y="385" class="cell">Image (ntdll.dll)</text>
  <text x="570" y="385" class="good">✓ Clean</text>

  <!-- Bottom labels -->
  <rect x="30" y="420" width="310" height="44" rx="8" fill="#fce8e8" stroke="#e05252" stroke-width="1.5"/>
  <text x="185" y="440" text-anchor="middle" class="bad" font-size="13">RWX + Private Commit</text>
  <text x="185" y="456" text-anchor="middle" class="sub">Instant detection by any scanner</text>

  <rect x="370" y="420" width="310" height="44" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="1"/>
  <text x="525" y="440" text-anchor="middle" class="hdr">RX + Image Backed</text>
  <text x="525" y="456" text-anchor="middle" class="sub">Looks like a legitimate loaded DLL</text>

  <!-- Key IOC callout -->
  <rect x="30" y="478" width="660" height="30" rx="6" fill="none" stroke="#e05252" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="360" y="498" text-anchor="middle" font-size="12" fill="#e05252" font-weight="700">IOC: RWX + Private Commit + Unbacked = Malware signature for every EDR on the market</text>
</svg>