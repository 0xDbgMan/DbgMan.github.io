<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1e1e2e"/>

  <!-- Code window -->
  <rect x="120" y="105" width="960" height="420" rx="12" fill="#11111b" stroke="#313244" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="120" y="105" width="960" height="42" rx="12" fill="#181825"/>
  <rect x="120" y="135" width="960" height="12" fill="#181825"/>

  <!-- Traffic lights -->
  <circle cx="148" cy="126" r="7" fill="#f38ba8"/>
  <circle cx="170" cy="126" r="7" fill="#f9e2af"/>
  <circle cx="192" cy="126" r="7" fill="#a6e3a1"/>

  <!-- Filename -->
  <text x="600" y="131" text-anchor="middle" fill="#7f849c" font-size="16">loader.c — 0xDbgMan</text>

  <!-- Code lines -->
  <g font-size="20">
    <text x="155" y="195" fill="#6c7086">01</text>
    <text x="200" y="195" fill="#cba6f7">#include</text>
    <text x="310" y="195" fill="#a6e3a1">&lt;windows.h&gt;</text>

    <text x="155" y="225" fill="#6c7086">02</text>

    <text x="155" y="255" fill="#6c7086">03</text>
    <text x="200" y="255" fill="#89b4fa">int</text>
    <text x="240" y="255" fill="#f9e2af">main</text>
    <text x="290" y="255" fill="#cdd6f4">() {</text>

    <text x="155" y="285" fill="#6c7086">04</text>
    <text x="240" y="285" fill="#cdd6f4">void *mem =</text>
    <text x="395" y="285" fill="#f9e2af">VirtualAlloc</text>
    <text x="540" y="285" fill="#cdd6f4">(0, sz,</text>
    <text x="640" y="285" fill="#fab387">MEM_COMMIT</text>
    <text x="765" y="285" fill="#cdd6f4">,</text>
    <text x="780" y="285" fill="#fab387">PAGE_RWX</text>
    <text x="880" y="285" fill="#cdd6f4">);</text>

    <text x="155" y="315" fill="#6c7086">05</text>
    <text x="240" y="315" fill="#f9e2af">memcpy</text>
    <text x="320" y="315" fill="#cdd6f4">(mem, payload, sz);</text>

    <text x="155" y="345" fill="#6c7086">06</text>
    <text x="240" y="345" fill="#cdd6f4">((void(*)())mem)();</text>

    <text x="155" y="375" fill="#6c7086">07</text>
    <text x="200" y="375" fill="#cdd6f4">}</text>
  </g>

  <!-- Title under window -->
  <text x="600" y="585" text-anchor="middle" fill="#cdd6f4" font-size="32" font-weight="700">Shellcode Loaders <tspan fill="#7f849c" font-weight="400">— the art of execution</tspan></text>
</svg>
