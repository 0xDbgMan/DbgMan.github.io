<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#151515" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Prompt line -->
  <text x="180" y="305" fill="#ff6a1a" font-size="56" font-weight="700">&gt;_</text>
  <text x="270" y="305" fill="#ffffff" font-size="56" font-weight="700">shellcode_loaders</text>

  <!-- Subtitle, indented under prompt -->
  <text x="270" y="360" fill="#6a6a6a" font-size="26" font-weight="400">// the art of execution</text>

  <!-- Bottom-left author tag -->
  <text x="180" y="560" fill="#3a3a3a" font-size="20">~/0xDbgMan</text>

  <!-- Right side blinking cursor block -->
  <rect x="1010" y="270" width="22" height="44" fill="#ff6a1a"/>
</svg>
