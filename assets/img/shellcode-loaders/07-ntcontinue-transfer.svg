<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <style>
    .t { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .s { font-size: 11px; fill: #666; }
    .c { font-size: 11px; fill: #333; }
    .box { fill: #f5f5f5; stroke: #ccc; stroke-width: 1; }
    .box-r { fill: #fce8e8; stroke: #e05252; stroke-width: 1.5; }
    .box-a { fill: #f0f0f0; stroke: #333; stroke-width: 1.5; }
    .box-d { fill: none; stroke: #999; stroke-width: 1; stroke-dasharray: 6 4; }
  </style>

  <!-- LEFT: Direct call -->
  <text x="160" y="22" text-anchor="middle" class="t">Direct call — EXPOSED</text>

  <rect x="40" y="35" width="240" height="235" rx="10" class="box-d"/>
  <text x="160" y="55" text-anchor="middle" class="s">Call Stack</text>

  <rect x="60" y="65" width="200" height="30" rx="4" class="box-r"/>
  <text x="160" y="84" text-anchor="middle" font-size="11" fill="#e05252" font-weight="700">ret → 0x1A0042 (PIC loader)</text>

  <rect x="60" y="103" width="200" height="30" rx="4" class="box"/>
  <text x="160" y="122" text-anchor="middle" class="c">beacon!DllMain</text>

  <rect x="60" y="141" width="200" height="30" rx="4" class="box"/>
  <text x="160" y="160" text-anchor="middle" class="c">beacon!command_handler</text>

  <rect x="60" y="179" width="200" height="30" rx="4" class="box"/>
  <text x="160" y="198" text-anchor="middle" class="c">kernel32!Sleep</text>

  <rect x="60" y="220" width="200" height="30" rx="4" class="box"/>
  <text x="160" y="239" text-anchor="middle" class="c">ntdll!NtDelayExecution</text>

  <!-- Callout -->
  <line x1="262" y1="80" x2="295" y2="80" stroke="#e05252" stroke-width="1"/>
  <text x="300" y="76" font-size="10" fill="#e05252" font-weight="700">Return address</text>
  <text x="300" y="90" font-size="10" fill="#e05252" font-weight="700">→ unbacked memory!</text>

  <!-- Separator -->
  <line x1="360" y1="35" x2="360" y2="420" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- RIGHT: NtContinue -->
  <text x="540" y="22" text-anchor="middle" class="t">NtContinue — CLEAN</text>

  <rect x="400" y="35" width="280" height="270" rx="10" class="box-d"/>
  <text x="540" y="55" text-anchor="middle" class="s">Synthetic Call Stack</text>

  <rect x="420" y="65" width="240" height="30" rx="4" class="box-a"/>
  <text x="540" y="84" text-anchor="middle" class="c" font-weight="700">ntdll!RtlUserThreadStart</text>

  <rect x="420" y="103" width="240" height="30" rx="4" class="box-a"/>
  <text x="540" y="122" text-anchor="middle" class="c" font-weight="700">kernel32!BaseThreadInitThunk</text>

  <rect x="420" y="141" width="240" height="30" rx="4" class="box"/>
  <text x="540" y="160" text-anchor="middle" class="c">beacon!DllMain (image backed)</text>

  <rect x="420" y="179" width="240" height="30" rx="4" class="box"/>
  <text x="540" y="198" text-anchor="middle" class="c">beacon!command_handler</text>

  <rect x="420" y="217" width="240" height="30" rx="4" class="box"/>
  <text x="540" y="236" text-anchor="middle" class="c">kernel32!Sleep</text>

  <rect x="420" y="255" width="240" height="30" rx="4" class="box"/>
  <text x="540" y="274" text-anchor="middle" class="c">ntdll!NtDelayExecution</text>

  <text x="540" y="320" text-anchor="middle" font-size="11" fill="#333" font-weight="700">✓ Legitimate thread termination</text>
  <text x="540" y="336" text-anchor="middle" class="s">No return address to loader anywhere</text>

  <!-- Bottom: How -->
  <rect x="40" y="360" width="640" height="70" rx="8" fill="#fce8e8" stroke="#e05252" stroke-width="1"/>
  <text x="360" y="380" text-anchor="middle" font-size="12" fill="#e05252" font-weight="700">How NtContinue works</text>
  <text x="60" y="398" class="c">1. RtlCaptureContext(&amp;ctx)     3. ctx.Rsp = syntheticStack (fake frames)</text>
  <text x="60" y="414" class="c">2. ctx.Rip = beaconEntryPoint   4. NtContinue(&amp;ctx, FALSE) — no ret addr pushed</text>
</svg>