<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <style>
    .t { font-size: 14px; font-weight: 700; fill: #1a1a1a; }
    .s { font-size: 11px; fill: #666; }
    .c { font-size: 12px; fill: #333; }
    .r { fill: #e05252; }
    .box { fill: #f5f5f5; stroke: #ccc; stroke-width: 1; }
    .box-r { fill: #fce8e8; stroke: #e05252; stroke-width: 1; }
    .arr { stroke: #999; stroke-width: 1; fill: none; marker-end: url(#a); }
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 2L8 5L2 8" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

  <text x="360" y="24" text-anchor="middle" class="t">Ekko Sleep Obfuscation — Timer Queue ROP Chain</text>
  <text x="360" y="42" text-anchor="middle" class="s">Each step = NtContinue context executed on timer thread (clean call stack)</text>

  <rect x="40" y="56" width="580" height="38" rx="6" class="box"/>
  <text x="60" y="78" class="c" font-weight="700">① VirtualProtect(beacon, RX → RW)</text>
  <text x="600" y="78" class="s">100ms</text>
  <line x1="330" y1="94" x2="330" y2="108" class="arr"/>

  <rect x="40" y="110" width="580" height="38" rx="6" class="box-r"/>
  <text x="60" y="132" class="c" font-weight="700" fill="#e05252">② SystemFunction032(beacon, key) — RC4 ENCRYPT</text>
  <text x="600" y="132" class="s">200ms</text>
  <line x1="330" y1="148" x2="330" y2="162" class="arr"/>

  <rect x="40" y="164" width="580" height="38" rx="6" fill="#e05252" stroke="none"/>
  <text x="60" y="186" class="c" font-weight="700" fill="#fff">③ WaitForSingleObject(event, sleep_time) — SLEEP</text>
  <text x="600" y="186" font-size="11" fill="#fce8e8">300ms</text>
  <line x1="330" y1="202" x2="330" y2="216" class="arr"/>

  <rect x="40" y="218" width="580" height="38" rx="6" class="box-r"/>
  <text x="60" y="240" class="c" font-weight="700" fill="#e05252">④ SystemFunction032(beacon, key) — RC4 DECRYPT</text>
  <text x="600" y="240" class="s">400ms</text>
  <line x1="330" y1="256" x2="330" y2="270" class="arr"/>

  <rect x="40" y="272" width="580" height="38" rx="6" class="box"/>
  <text x="60" y="294" class="c" font-weight="700">⑤ VirtualProtect(beacon, RW → RX)</text>
  <text x="600" y="294" class="s">500ms</text>
  <line x1="330" y1="310" x2="330" y2="324" class="arr"/>

  <rect x="40" y="326" width="580" height="38" rx="6" class="box"/>
  <text x="60" y="348" class="c" font-weight="700">⑥ SetEvent(resume) — signal main thread</text>
  <text x="600" y="348" class="s">600ms</text>

  <!-- Bottom notes -->
  <rect x="40" y="380" width="290" height="30" rx="6" fill="#f0f0f0" stroke="#999" stroke-width="1"/>
  <text x="185" y="400" text-anchor="middle" class="s">Timer thread = clean BaseThreadInitThunk stack</text>

  <rect x="350" y="380" width="290" height="30" rx="6" class="box-r"/>
  <text x="495" y="400" text-anchor="middle" font-size="11" fill="#e05252">During step ③: beacon is encrypted + RW</text>
</svg>