<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <style>
    .t { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .s { font-size: 11px; fill: #666; }
    .c { font-size: 11px; fill: #333; }
    .box { fill: #f5f5f5; stroke: #ccc; stroke-width: 1; }
    .box-r { fill: #fce8e8; stroke: #e05252; stroke-width: 1.5; }
    .box-d { fill: none; stroke: #999; stroke-width: 1; stroke-dasharray: 6 4; }
    .arr { stroke: #999; stroke-width: 1; fill: none; marker-end: url(#a); }
    .arr-r { stroke: #e05252; stroke-width: 1.5; fill: none; marker-end: url(#ar); }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 2L8 5L2 8" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 2L8 5L2 8" fill="none" stroke="#e05252" stroke-width="1.5" stroke-linecap="round"/></marker>
  </defs>

  <!-- Beacon DLL IAT -->
  <rect x="20" y="20" width="200" height="200" rx="10" class="box-d"/>
  <text x="120" y="42" text-anchor="middle" class="s">Beacon DLL — IAT</text>

  <rect x="40" y="55" width="160" height="28" rx="4" class="box-r"/>
  <text x="120" y="74" text-anchor="middle" font-size="11" fill="#e05252" font-weight="700">Sleep()</text>

  <rect x="40" y="90" width="160" height="28" rx="4" class="box-r"/>
  <text x="120" y="109" text-anchor="middle" font-size="11" fill="#e05252" font-weight="700">WaitForSingleObject()</text>

  <rect x="40" y="130" width="160" height="28" rx="4" class="box"/>
  <text x="120" y="149" text-anchor="middle" class="c">VirtualAlloc()</text>

  <rect x="40" y="165" width="160" height="28" rx="4" class="box"/>
  <text x="120" y="184" text-anchor="middle" class="c">CreateFileW()</text>

  <!-- Hooked arrows -->
  <line x1="200" y1="69" x2="280" y2="69" class="arr-r"/>
  <line x1="200" y1="104" x2="280" y2="104" class="arr-r"/>

  <!-- Direct arrows (not hooked) -->
  <path d="M200 144 L250 144 L250 300 L290 300" class="arr"/>
  <path d="M200 179 L260 179 L260 315 L290 315" class="arr"/>

  <!-- __resolve_hook -->
  <rect x="282" y="45" width="170" height="80" rx="8" class="box-r"/>
  <text x="367" y="70" text-anchor="middle" font-size="12" fill="#e05252" font-weight="700">__resolve_hook()</text>
  <text x="367" y="88" text-anchor="middle" class="s">Generated at link time</text>
  <text x="367" y="103" text-anchor="middle" class="s">by Crystal Palace</text>

  <!-- Arrow to Hooking PICO -->
  <line x1="452" y1="85" x2="498" y2="85" class="arr-r"/>

  <!-- Hooking PICO -->
  <rect x="500" y="20" width="200" height="185" rx="10" fill="#fce8e8" stroke="#e05252" stroke-width="1.5"/>
  <text x="600" y="42" text-anchor="middle" font-size="12" fill="#e05252" font-weight="700">Hooking PICO</text>
  <text x="600" y="58" text-anchor="middle" class="s">Memory-resident with beacon</text>

  <rect x="520" y="72" width="160" height="50" rx="4" fill="#fff" stroke="#e05252" stroke-width="1"/>
  <text x="600" y="92" text-anchor="middle" class="c" font-weight="700">_Sleep()</text>
  <text x="600" y="108" text-anchor="middle" class="s">Encrypt → Wait → Decrypt</text>

  <rect x="520" y="132" width="160" height="50" rx="4" fill="#fff" stroke="#e05252" stroke-width="1"/>
  <text x="600" y="152" text-anchor="middle" class="c" font-weight="700">_WaitForSingleObject()</text>
  <text x="600" y="168" text-anchor="middle" class="s">Ekko sleep obfuscation</text>

  <!-- Arrow from PICO to real API (spoofed) -->
  <path d="M600 182 L600 240 L420 240 L420 280" fill="none" stroke="#e05252" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="520" y="236" class="s" fill="#e05252">Calls real API via spoofed stack</text>

  <!-- Real APIs -->
  <rect x="290" y="280" width="180" height="60" rx="8" class="box"/>
  <text x="380" y="303" text-anchor="middle" class="t">kernel32.dll</text>
  <text x="380" y="320" text-anchor="middle" class="s">Real API addresses</text>
  <text x="380" y="335" text-anchor="middle" class="s">resolved via PEB walk</text>

  <!-- Legend -->
  <line x1="40" y1="380" x2="80" y2="380" class="arr-r"/>
  <text x="90" y="384" class="c">Hooked path (intercepted by PICO)</text>
  <line x1="40" y1="400" x2="80" y2="400" class="arr"/>
  <text x="90" y="404" class="c">Direct path (passes through normally)</text>

  <!-- Spec file -->
  <rect x="380" y="370" width="310" height="56" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="535" y="390" text-anchor="middle" class="c">addhook "KERNEL32$Sleep" "_Sleep"</text>
  <text x="535" y="405" text-anchor="middle" class="c">addhook "KERNEL32$WaitFor..." "_WaitFor..."</text>
  <text x="535" y="420" text-anchor="middle" class="c">filterhooks $DLL</text>
</svg>