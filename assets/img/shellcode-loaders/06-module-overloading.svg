<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <style>
    .t { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    .s { font-size: 11px; fill: #666; }
    .c { font-size: 11px; fill: #333; }
    .box { fill: #f5f5f5; stroke: #ccc; stroke-width: 1; }
    .box-a { fill: #f0f0f0; stroke: #333; stroke-width: 1.5; }
    .box-r { fill: #fce8e8; stroke: #e05252; stroke-width: 1; }
    .arr { stroke: #999; stroke-width: 1.2; fill: none; marker-end: url(#a); }
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 2L8 5L2 8" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

  <!-- Left: Steps -->
  <rect x="30" y="20" width="300" height="42" rx="6" class="box"/>
  <text x="45" y="38" class="t">1</text><text x="65" y="38" class="c">Find sacrificial DLL on disk</text>
  <text x="65" y="52" class="s">C:\Windows\System32\mshtml.dll</text>

  <line x1="180" y1="62" x2="180" y2="80" class="arr"/>

  <rect x="30" y="82" width="300" height="42" rx="6" class="box-a"/>
  <text x="45" y="100" class="t">2</text><text x="65" y="100" class="c" font-weight="700">NtCreateSection(SEC_IMAGE)</text>
  <text x="65" y="114" class="s">Same mechanism the OS uses for DLLs</text>

  <line x1="180" y1="124" x2="180" y2="142" class="arr"/>

  <rect x="30" y="144" width="300" height="42" rx="6" class="box-a"/>
  <text x="45" y="162" class="t">3</text><text x="65" y="162" class="c" font-weight="700">NtMapViewOfSection</text>
  <text x="65" y="176" class="s">Memory is now image backed</text>

  <line x1="180" y1="186" x2="180" y2="204" class="arr"/>

  <rect x="30" y="206" width="300" height="42" rx="6" class="box-r"/>
  <text x="45" y="224" class="t" fill="#e05252">4</text><text x="65" y="224" class="c" font-weight="700" fill="#e05252">Overwrite with beacon sections</text>
  <text x="65" y="238" class="s">.text → RX, .data → RW, .rdata → R</text>

  <line x1="180" y1="248" x2="180" y2="266" class="arr"/>

  <rect x="30" y="268" width="300" height="42" rx="6" class="box-a"/>
  <text x="45" y="286" class="t">5</text><text x="65" y="286" class="c" font-weight="700">RtlAddFunctionTable(.pdata)</text>
  <text x="65" y="300" class="s">Register unwind data for clean stacks</text>

  <!-- Right: Before/After -->
  <rect x="380" y="20" width="310" height="140" rx="10" fill="none" stroke="#e05252" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="535" y="42" text-anchor="middle" font-size="12" fill="#e05252" font-weight="700">Before (VirtualAlloc)</text>
  <rect x="400" y="52" width="270" height="22" rx="3" class="box-r"/><text x="535" y="67" text-anchor="middle" class="c" fill="#e05252">Private commit — RWX</text>
  <rect x="400" y="78" width="270" height="22" rx="3" class="box-r"/><text x="535" y="93" text-anchor="middle" class="c" fill="#e05252">Unbacked executable memory</text>
  <rect x="400" y="104" width="270" height="22" rx="3" class="box-r"/><text x="535" y="119" text-anchor="middle" class="c" fill="#e05252">No .pdata → broken call stacks</text>
  <rect x="400" y="130" width="270" height="22" rx="3" class="box-r"/><text x="535" y="145" text-anchor="middle" class="c" fill="#e05252">Moneta / BeaconHunter → flagged</text>

  <rect x="380" y="180" width="310" height="140" rx="10" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="535" y="202" text-anchor="middle" class="t">After (Module Overloading)</text>
  <rect x="400" y="212" width="270" height="22" rx="3" class="box"/><text x="535" y="227" text-anchor="middle" class="c">Image commit — RX</text>
  <rect x="400" y="238" width="270" height="22" rx="3" class="box"/><text x="535" y="253" text-anchor="middle" class="c">Backed by mshtml.dll on disk</text>
  <rect x="400" y="264" width="270" height="22" rx="3" class="box"/><text x="535" y="279" text-anchor="middle" class="c">.pdata registered → clean stacks</text>
  <rect x="400" y="290" width="270" height="22" rx="3" class="box"/><text x="535" y="305" text-anchor="middle" class="c">Invisible to memory scanners</text>

  <!-- OPSEC Note -->
  <rect x="30" y="340" width="660" height="80" rx="8" fill="#fce8e8" stroke="#e05252" stroke-width="1"/>
  <text x="360" y="362" text-anchor="middle" font-size="12" fill="#e05252" font-weight="700">OPSEC</text>
  <text x="360" y="380" text-anchor="middle" class="c">• No LoadLibrary call → no LdrLoadDll kernel callback → no image load event</text>
  <text x="360" y="396" text-anchor="middle" class="c">• CFG restrictions bypassed (NtMapViewOfSection doesn't go through CFG)</text>
  <text x="360" y="412" text-anchor="middle" class="c">• EDR kernel callbacks for module loads are never triggered</text>
</svg>